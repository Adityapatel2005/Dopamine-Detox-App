name: Lockd
options:
  bundleIdPrefix: com.lockd
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Lockd:
    type: application
    platform: iOS
    sources:
      - path: Lockd
    info:
      path: Lockd/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lockd.app
        INFOPLIST_FILE: Lockd/Info.plist
  LockdTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LockdTests
    dependencies:
      - target: Lockd
